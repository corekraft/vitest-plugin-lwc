name: Publish

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Build package
        run: pnpm build

      - name: Install fixture dependencies
        run: |
          npm ci --prefix fixtures/sfdx-project
          npm ci --prefix fixtures/lwc-recipes

      - name: Run e2e tests
        run: pnpm test:e2e

      - name: Install semantic-release
        run: >
          npm i -g
          semantic-release
          @semantic-release/commit-analyzer
          @semantic-release/release-notes-generator
          @semantic-release/npm
          @semantic-release/github
          conventional-changelog-conventionalcommits

      - name: Copy materials
        run: |
          mkdir -p dist
          cp package.json README.md LICENSE dist

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SEMANTIC_RELEASE_STABLE=true semantic-release
          else
            semantic-release
          fi
