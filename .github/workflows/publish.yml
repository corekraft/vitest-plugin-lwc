name: Publish

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Build package
        run: pnpm build

      - name: Install fixture dependencies
        run: |
          npm ci --prefix fixtures/sfdx-project
          npm ci --prefix fixtures/lwc-recipes

      - name: Run e2e tests
        run: pnpm test:e2e

      - name: Install semantic-release
        run: >
          npm i -g
          semantic-release
          @semantic-release/commit-analyzer
          @semantic-release/release-notes-generator
          @semantic-release/npm
          @semantic-release/exec
          @semantic-release/github
          conventional-changelog-conventionalcommits

      - name: Copy materials
        env:
          SEMANTIC_RELEASE_STABLE: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          mkdir -p dist
          cp package.json README.md LICENSE dist
          node -e "const fs = require('node:fs'); const { execSync } = require('node:child_process'); const packagePath = 'dist/package.json'; const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8')); if (process.env.SEMANTIC_RELEASE_STABLE !== 'true') { const latestTag = execSync('git describe --tags --abbrev=0', { encoding: 'utf8' }).trim(); pkg.version = latestTag.replace(/^v/, ''); } delete pkg.scripts; delete pkg.devDependencies; delete pkg.packageManager; delete pkg['lint-staged']; delete pkg.prettier; fs.writeFileSync(packagePath, JSON.stringify(pkg, null, 2) + '\n');"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_CONFIG_PROVENANCE: true
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SEMANTIC_RELEASE_STABLE=true semantic-release
          else
            semantic-release
          fi
